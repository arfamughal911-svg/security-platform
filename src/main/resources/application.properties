server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/securitydb
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=security-group
spring.kafka.consumer.auto-offset-reset=earliest

# API Keys - DO NOT commit real keys. Copy application.properties.example and add your keys.
abuseipdb.api.key=YOUR_ABUSEIPDB_KEY_HERE
alienvault.api.key=YOUR_ALIENVAULT_KEY_HERE

